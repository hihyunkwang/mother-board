<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>어머니 안내판</title>

<style>

body{
    margin:0;
    background:#ffffff;
    font-family:"Malgun Gothic",sans-serif;
    text-align:center;
    overflow:hidden;
}

#date{
    margin-top:25px;
    font-size:40px;
    font-weight:900;
    color:#0B3B82;
}

#time{
    margin-top:8px;
    font-size:35px;
    font-weight:700;
    color:#0B6121;
}

#line1{
    width:85%;
    margin:20px auto 15px auto;
    border-top:3px solid #BDBDBD;
}

#slidebox{
    width:92%;
    height:75vh;
    margin:0 auto;
}

#slidebox iframe{
    width:100%;
    height:100%;
    border:none;
}

</style>

</head>

<body>

<div id="date"></div>

<div id="time"></div>

<div id="line1"></div>

<div id="slidebox">

<iframe
id="slideframe"
src="https://docs.google.com/presentation/d/e/2PACX-1vQY5_7A6zYm3IEPqBdrYxFi49bWVykBUr7_qCncWm0B_-sonUlEFxzKCY7lCKzB-4TmBj854SSxkBfc/embed?start=false&loop=false&delayms=3000&rm=minimal"
allowfullscreen>
</iframe>

</div>

<script>

function updateClock(){

    const now = new Date();

    const week = ["일","월","화","수","목","금","토"];

    document.getElementById("date").innerHTML =
        now.getFullYear() + "년 "
        + (now.getMonth()+1) + "월 "
        + now.getDate() + "일 ("
        + week[now.getDay()] + ")";

    let h = now.getHours();
    let m = now.getMinutes();

    let ap = h >= 12 ? "오후" : "오전";

    h = h % 12;
    if(h === 0) h = 12;

    document.getElementById("time").innerHTML =
        ap + " " +
        h + ":" +
        String(m).padStart(2,"0");
}

updateClock();
setInterval(updateClock,1000);
setInterval(function(){

    var frame = document.getElementById("slideframe");

    frame.src =
        "https://docs.google.com/presentation/d/e/2PACX-1vQY5_7A6zYm3IEPqBdrYxFi49bWVykBUr7_qCncWm0B_-sonUlEFxzKCY7lCKzB-4TmBj854SSxkBfc/embed?start=false&loop=false&delayms=3000&rm=minimal"
        + new Date().getTime();

},600000);

</script>

</body>
</html>
